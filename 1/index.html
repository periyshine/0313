<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 居家生活助手</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f0eb;
    --bg-card: #ffffff;
    --primary: #e07a5f;
    --primary-light: #f2a68d;
    --primary-dark: #c4563d;
    --accent: #81b29a;
    --accent-light: #a8d5ba;
    --text: #3d405b;
    --text-light: #6b6e8a;
    --text-muted: #9a9bb0;
    --border: #e8e3de;
    --shadow: 0 4px 24px rgba(61,64,91,.08);
    --shadow-lg: 0 12px 40px rgba(61,64,91,.12);
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    overflow: hidden;
  }

  /* 背景装饰 */
  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(224,122,95,.12) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -150px; left: -150px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(129,178,154,.12) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  /* 主容器 */
  .app {
    width: 100%;
    max-width: 480px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    background: var(--bg);
  }

  /* 顶部导航 */
  .header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }
  .header-avatar {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 18px;
    box-shadow: 0 4px 12px rgba(224,122,95,.3);
  }
  .header-info h1 { font-size: 17px; font-weight: 600; color: var(--text); }
  .header-info p { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
  .header-info .online-dot {
    width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
    display: inline-block;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .5; transform: scale(.8); }
  }
  .header-action {
    margin-left: auto;
    width: 36px; height: 36px;
    border: none; background: var(--bg);
    border-radius: 10px;
    color: var(--text-light);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .header-action:hover { background: var(--border); color: var(--text); }

  /* 聊天区域 */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 8px;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* 欢迎界面 */
  .welcome {
    text-align: center;
    padding: 20px 10px 10px;
  }
  .welcome-icon {
    width: 72px; height: 72px;
    margin: 0 auto 14px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 32px;
    box-shadow: 0 8px 24px rgba(224,122,95,.25);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .welcome h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .welcome p { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

  /* 分类快捷入口 */
  .categories {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin: 20px 0 24px;
  }
  .cat-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 6px;
    text-align: center;
    cursor: pointer;
    transition: all .25s;
  }
  .cat-btn:hover {
    border-color: var(--primary-light);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }
  .cat-btn:active { transform: translateY(0); }
  .cat-btn .icon {
    width: 38px; height: 38px;
    margin: 0 auto 8px;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .cat-btn span { font-size: 11px; color: var(--text-light); font-weight: 500; }
  .cat-btn.cook .icon  { background: #fff0ed; color: var(--primary); }
  .cat-btn.clean .icon { background: #edf8f3; color: #3aad8a; }
  .cat-btn.health .icon { background: #eef0ff; color: #6366f1; }
  .cat-btn.org .icon   { background: #fff8ed; color: #f59e0b; }
  .cat-btn.plant .icon { background: #edfbe8; color: #22c55e; }
  .cat-btn.pet .icon   { background: #fef3f2; color: #ef4444; }
  .cat-btn.buy .icon   { background: #f0f4ff; color: #3b82f6; }
  .cat-btn.tips .icon  { background: #fdf2f8; color: #ec4899; }

  /* 热门问题 */
  .hot-questions { margin-bottom: 16px; }
  .hot-questions h3 {
    font-size: 13px; font-weight: 500; color: var(--text-muted);
    margin-bottom: 10px; padding-left: 4px;
  }
  .hot-list { display: flex; flex-direction: column; gap: 8px; }
  .hot-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer;
    transition: all .2s;
    font-size: 13px;
    color: var(--text);
  }
  .hot-item:hover {
    border-color: var(--primary-light);
    box-shadow: var(--shadow);
  }
  .hot-item .hot-icon {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: linear-gradient(135deg, #fff0ed, #fff8f5);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--primary);
    flex-shrink: 0;
  }
  .hot-item .hot-text { flex: 1; }
  .hot-item .hot-arrow { color: var(--text-muted); font-size: 11px; }

  /* 消息气泡 */
  .msg { display: flex; gap: 10px; margin-bottom: 16px; animation: msgIn .4s ease; }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
    margin-top: 2px;
  }
  .msg.bot .msg-avatar {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: #fff;
  }
  .msg.user .msg-avatar {
    background: #eef0ff;
    color: #6366f1;
  }
  .msg-bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.7;
  }
  .msg.bot .msg-bubble {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }
  .msg.user .msg-bubble {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    border-top-right-radius: 4px;
  }
  .msg-time {
    font-size: 10px; color: var(--text-muted);
    margin-top: 4px;
    text-align: center;
  }

  /* AI 回复中的指引卡片 */
  .guide-card {
    background: linear-gradient(135deg, #fef9f7, #f0faf5);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin: 10px 0 4px;
    overflow: hidden;
  }
  .guide-card-title {
    padding: 10px 14px;
    font-size: 13px; font-weight: 600;
    color: var(--text);
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,.7);
  }
  .guide-card-title i { color: var(--primary); }
  .guide-steps { padding: 6px 0; }
  .guide-step {
    padding: 8px 14px;
    display: flex; gap: 10px;
    align-items: flex-start;
    font-size: 13px;
    color: var(--text-light);
    line-height: 1.6;
  }
  .guide-step-num {
    width: 22px; height: 22px;
    background: var(--primary);
    color: #fff;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .guide-tip {
    padding: 10px 14px;
    background: rgba(129,178,154,.08);
    border-top: 1px dashed #d4ddd8;
    font-size: 12px;
    color: var(--accent);
    display: flex; align-items: center; gap: 8px;
    line-height: 1.5;
  }
  .guide-tip i { flex-shrink: 0; }

  /* 标签 */
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 4px; }
  .tag {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
  }
  .tag.red   { background: #fff0ed; color: var(--primary-dark); }
  .tag.green { background: #edf8f3; color: #22a06b; }
  .tag.blue  { background: #eef0ff; color: #6366f1; }

  /* 输入区域 */
  .input-area {
    padding: 12px 16px 28px;
    background: rgba(255,255,255,.9);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
  }
  .quick-tags {
    display: flex; gap: 8px;
    overflow-x: auto;
    padding-bottom: 10px;
    scrollbar-width: none;
  }
  .quick-tags::-webkit-scrollbar { display: none; }
  .quick-tag {
    padding: 5px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-light);
    cursor: pointer;
    white-space: nowrap;
    transition: all .2s;
  }
  .quick-tag:hover { border-color: var(--primary); color: var(--primary); }
  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
  }
  .input-wrap {
    flex: 1;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 22px;
    display: flex; align-items: flex-end;
    padding: 4px 4px 4px 16px;
    transition: border-color .2s;
  }
  .input-wrap:focus-within { border-color: var(--primary-light); }
  .input-wrap textarea {
    flex: 1;
    border: none; outline: none;
    background: transparent;
    font-family: inherit; font-size: 14px;
    color: var(--text);
    resize: none;
    min-height: 36px;
    max-height: 100px;
    padding: 6px 0;
    line-height: 1.5;
  }
  .input-wrap textarea::placeholder { color: var(--text-muted); }
  .send-btn {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border: none; border-radius: 50%;
    color: #fff; font-size: 15px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
    flex-shrink: 0;
  }
  .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(224,122,95,.4); }
  .send-btn:active { transform: scale(.95); }
  .send-btn:disabled { opacity: .4; cursor: default; transform: none; box-shadow: none; }

  /* 打字指示器 */
  .typing { display: flex; gap: 4px; padding: 4px 0; }
  .typing span {
    width: 7px; height: 7px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: typing 1.4s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: .4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* 隐藏欢迎界面 */
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="app">
  <!-- 顶部 -->
  <div class="header">
    <div class="header-avatar"><i class="fas fa-home"></i></div>
    <div class="header-info">
      <h1>居家生活助手</h1>
      <p><span class="online-dot"></span> 智能为你服务中</p>
    </div>
    <button class="header-action" id="clearBtn" title="清空对话"><i class="fas fa-rotate-right"></i></button>
  </div>

  <!-- 聊天区 -->
  <div class="chat-area" id="chatArea">
    <!-- 欢迎界面 -->
    <div class="welcome" id="welcome">
      <div class="welcome-icon"><i class="fas fa-robot"></i></div>
      <h2>你好，有什么可以帮你？</h2>
      <p>告诉我你的居家需求，我来为你生成<br>贴心、实用的生活指引</p>
    </div>

    <div class="categories" id="categories">
      <div class="cat-btn cook" data-q="今天不知道做什么菜，帮我推荐几道家常菜">
        <div class="icon"><i class="fas fa-utensils"></i></div><span>美食推荐</span>
      </div>
      <div class="cat-btn clean" data-q="家里比较脏了，帮我制定一个全屋大扫除计划">
        <div class="icon"><i class="fas fa-broom"></i></div><span>清洁整理</span>
      </div>
      <div class="cat-btn health" data-q="最近总觉得身体疲劳，有什么居家养生建议？">
        <div class="icon"><i class="fas fa-heart-pulse"></i></div><span>健康养生</span>
      </div>
      <div class="cat-btn org" data-q="家里东西太多太乱，帮我整理收纳">
        <div class="icon"><i class="fas fa-boxes-stacked"></i></div><span>收纳整理</span>
      </div>
      <div class="cat-btn plant" data-q="买了一盆绿萝回来，怎么养护好它？">
        <div class="icon"><i class="fas fa-seedling"></i></div><span>绿植养护</span>
      </div>
      <div class="cat-btn pet" data-q="想养一只猫，新手养猫需要注意什么？">
        <div class="icon"><i class="fas fa-paw"></i></div><span>宠物照顾</span>
      </div>
      <div class="cat-btn buy" data-q="家里快没日用品了，帮我列一份采购清单">
        <div class="icon"><i class="fas fa-cart-shopping"></i></div><span>采购清单</span>
      </div>
      <div class="cat-btn tips" data-q="夏天快到了，有什么居家省电妙招？">
        <div class="icon"><i class="fas fa-lightbulb"></i></div><span>生活妙招</span>
      </div>
    </div>

    <div class="hot-questions" id="hotQuestions">
      <h3><i class="fas fa-fire"></i> 热门需求</h3>
      <div class="hot-list">
        <div class="hot-item" data-q="空调滤网怎么清洗？">空调滤网怎么清洗？</div>
        <div class="hot-item" data-q="衣服沾了油渍怎么去除？">衣服沾了油渍怎么去除？</div>
        <div class="hot-item" data-q="厨房下水道堵塞了怎么疏通？">厨房下水道堵塞了怎么疏通？</div>
        <div class="hot-item" data-q="怎样让家里蚊子变少？">怎样让家里蚊子变少？</div>
      </div>
    </div>

    <!-- 消息会插入这里 -->
    <div id="msgContainer"></div>
  </div>

  <!-- 输入区域 -->
  <div class="input-area">
    <div class="quick-tags">
      <span class="quick-tag" data-q="今天吃什么">今天吃什么</span>
      <span class="quick-tag" data-q="怎么去除异味">去除异味</span>
      <span class="quick-tag" data-q="收纳技巧">收纳技巧</span>
      <span class="quick-tag" data-q="家里太热了怎么办">家里太热了</span>
      <span class="quick-tag" data-q="垃圾分类指南">垃圾分类</span>
      <span class="quick-tag" data-q="除虫灭蟑螂">除虫灭蟑螂</span>
    </div>
    <div class="input-row">
      <div class="input-wrap">
        <textarea id="userInput" rows="1" placeholder="描述你的居家需求..."></textarea>
        <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>
</div>

<script>
const chatArea = document.getElementById('chatArea');
const msgContainer = document.getElementById('msgContainer');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const welcome = document.getElementById('welcome');
const categories = document.getElementById('categories');
const hotQuestions = document.getElementById('hotQuestions');
const clearBtn = document.getElementById('clearBtn');

// 自适应输入框高度
userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 100) + 'px';
});

// 发送
sendBtn.addEventListener('click', handleSend);
userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});

// 各快捷入口
document.querySelectorAll('[data-q]').forEach(el => {
  el.addEventListener('click', () => sendMessage(el.dataset.q));
});

// 清空
clearBtn.addEventListener('click', () => {
  msgContainer.innerHTML = '';
  welcome.classList.remove('hidden');
  categories.classList.remove('hidden');
  hotQuestions.classList.remove('hidden');
});

function handleSend() {
  const text = userInput.value.trim();
  if (!text) return;
  sendMessage(text);
  userInput.value = '';
  userInput.style.height = 'auto';
}

function hideWelcome() {
  welcome.classList.add('hidden');
  categories.classList.add('hidden');
  hotQuestions.classList.add('hidden');
}

function getNow() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function appendHtml(html, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.innerHTML = html;
  msgContainer.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

function showTyping() {
  return appendHtml(
    `<div class="msg-avatar"><i class="fas fa-robot"></i></div>
     <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`,
    'bot'
  );
}

function sendMessage(text) {
  hideWelcome();
  appendHtml(
    `<div class="msg-avatar"><i class="fas fa-user"></i></div>
     <div class="msg-bubble">${escapeHtml(text)}</div>`,
    'user'
  );

  const typingEl = showTyping();
  const delay = 600 + Math.random() * 1000;

  setTimeout(() => {
    typingEl.remove();
    const reply = generateReply(text);
    appendHtml(
      `<div class="msg-avatar"><i class="fas fa-robot"></i></div>
       <div class="msg-bubble">${reply}</div>
       <div class="msg-time">${getNow()}</div>`,
      'bot'
    );
  }, delay);
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ============ 智能回复生成 ============
function generateReply(q) {
  const k = q.toLowerCase();

  // 含义匹配
  if (/吃什么|做什么菜|菜谱|推荐.*菜|不知道.*做|晚餐|午餐|早餐/.test(k)) return replyCooking();
  if (/清洁|打扫|大扫除|卫生|拖地|擦/.test(k)) return replyCleaning();
  if (/疲劳|养生|健康|睡眠|失眠|颈椎|腰痛|头疼/.test(k)) return replyHealth();
  if (/收纳|整理|东西.*乱|太乱|杂|空间/.test(k)) return replyOrganize();
  if (/绿萝|植物|养花|浇水|盆栽|多肉|花/.test(k)) return replyPlant();
  if (/养猫|养狗|宠物|猫|狗/.test(k)) return replyPet();
  if (/采购|购物|清单|日用品|缺/.test(k)) return replyShopping();
  if (/省电|妙招|生活.*技巧|小窍门|去除异味|异味|蚊子|蟑螂|虫/.test(k)) return replyTips(k);
  if (/空调|滤网|清洗.*电/.test(k)) return replyAircon();
  if (/油渍|衣.*脏|洗.*衣|污渍|染色/.test(k)) return replyStain();
  if (/下水道|堵|管道|疏通/.test(k)) return replyDrain();
